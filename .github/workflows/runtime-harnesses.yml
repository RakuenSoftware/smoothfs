name: Privileged runtime harnesses

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Runtime harness suite to run.
        required: true
        default: core
        type: choice
        options:
          - core
          - protocol
          - ops
          - all
      tests:
        description: Optional space-separated harness script names. Overrides suite when set.
        required: false
        default: ""
        type: string
      module_mode:
        description: How the runner should provide smoothfs.ko.
        required: true
        default: build-and-load
        type: choice
        options:
          - build-and-load
          - preinstalled
      fail_fast:
        description: Stop after the first failing harness.
        required: true
        default: false
        type: boolean
      arch:
        description: CPU architecture of the self-hosted runner. Selects the runner label `smoothfs-runtime-<arch>`.
        required: true
        default: arm64
        type: choice
        options:
          - amd64
          - arm64
  # Auto-trigger the core suite on every push to main that touches
  # kernel sources, the runtime harnesses, the build path, or the
  # control-plane Go code. workflow_dispatch above stays available
  # for operators who want a different suite / module_mode.
  # Defaults for the push path: suite=core, module_mode=build-and-load,
  # fail_fast=false (inlined where used as `inputs.X || '...'`). The
  # arch dimension is a matrix: push runs both arm64 and amd64,
  # workflow_dispatch runs only the operator-selected arch.
  push:
    branches:
      - main
    paths:
      - 'src/smoothfs/**'
      - 'controlplane/**'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/runtime-harnesses.yml'

permissions:
  contents: read

jobs:
  setup:
    name: Pick arch matrix
    runs-on: ubuntu-latest
    outputs:
      arches: ${{ steps.pick.outputs.arches }}
    steps:
      - id: pick
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_ARCH: ${{ inputs.arch }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            printf 'arches=["%s"]\n' "$DISPATCH_ARCH" >> "$GITHUB_OUTPUT"
          else
            printf 'arches=["arm64","amd64"]\n' >> "$GITHUB_OUTPUT"
          fi

  runtime-harnesses:
    name: Runtime harnesses (${{ matrix.arch }})
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.setup.outputs.arches) }}
    runs-on: [self-hosted, linux, "smoothfs-runtime-${{ matrix.arch }}"]
    concurrency:
      group: smoothfs-runtime-${{ github.ref }}-${{ matrix.arch }}-${{ inputs.suite || 'core' }}
      cancel-in-progress: false
    timeout-minutes: 240
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check privileged runner prerequisites
        run: |
          set -euo pipefail
          command -v sudo >/dev/null
          sudo -n true
          command -v bash >/dev/null
          command -v go >/dev/null
          command -v make >/dev/null
          command -v mount >/dev/null
          command -v mkfs.xfs >/dev/null
          command -v insmod >/dev/null
          command -v lsmod >/dev/null
          command -v modinfo >/dev/null
          command -v modprobe >/dev/null
          test -e /dev/loop-control

      - name: Build and load smoothfs module
        if: ${{ (inputs.module_mode || 'build-and-load') == 'build-and-load' }}
        run: |
          set -euo pipefail
          test -d "/lib/modules/$(uname -r)/build"
          make kernel-build
          if lsmod | awk '{print $1}' | grep -qx smoothfs; then
            echo "smoothfs module is already loaded"
          else
            sudo -n insmod src/smoothfs/smoothfs.ko
          fi

      - name: Verify preinstalled smoothfs module
        if: ${{ (inputs.module_mode || 'build-and-load') == 'preinstalled' }}
        run: |
          set -euo pipefail
          modinfo smoothfs >/dev/null
          sudo -n modprobe smoothfs

      # The smb_vfs_module.sh harness is the only one that needs
      # /usr/lib/<multiarch>/samba/vfs/smoothfs.so. Build it on demand for
      # suites that include it. The samba source tree at /tmp/samba-<ver>
      # is laid down by runner-setup.sh (apt-get source samba); the build
      # itself takes ~5min on amd64, longer on TCG-emulated arm64. Skip
      # entirely when the suite doesn't need it (core/ops/push) so the
      # regression gate doesn't pay the cost.
      - name: Build smoothfs Samba VFS module
        if: ${{ inputs.suite == 'protocol' || inputs.suite == 'all' || contains(inputs.tests || '', 'smb_vfs_module') }}
        run: |
          set -euo pipefail
          sudo -n bash src/smoothfs/samba-vfs/build.sh

      - name: Run runtime harnesses
        env:
          SUITE: ${{ inputs.suite || 'core' }}
          TESTS: ${{ inputs.tests || '' }}
          FAIL_FAST: ${{ inputs.fail_fast || 'false' }}
        run: |
          set -euo pipefail
          log_dir="$RUNNER_TEMP/smoothfs-runtime"
          mkdir -p "$log_dir" "$RUNNER_TEMP/go-cache" "$RUNNER_TEMP/go-mod"

          fail_fast=0
          if [ "$FAIL_FAST" = "true" ]; then
            fail_fast=1
          fi

          sudo -n env \
            "PATH=$PATH" \
            "HOME=$RUNNER_TEMP" \
            "GOCACHE=$RUNNER_TEMP/go-cache" \
            "GOMODCACHE=$RUNNER_TEMP/go-mod" \
            "SMOOTHFS_RUNTIME_SUITE=$SUITE" \
            "SMOOTHFS_RUNTIME_TESTS=$TESTS" \
            "SMOOTHFS_RUNTIME_FAIL_FAST=$fail_fast" \
            bash src/smoothfs/test/run_runtime_harnesses.sh 2>&1 | tee "$log_dir/runtime-harnesses.log"

      - name: Upload runtime harness log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoothfs-runtime-${{ matrix.arch }}-${{ inputs.suite || 'core' }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/smoothfs-runtime/*.log
          if-no-files-found: ignore
