PACKAGE_NAME="smoothfs"
PACKAGE_VERSION="0.1.0"
BUILT_MODULE_NAME[0]="smoothfs"
DEST_MODULE_LOCATION[0]="/extra"
AUTOINSTALL="yes"
MAKE[0]="make KDIR=/lib/modules/${kernelver}/build"
CLEAN="make clean"
# Kernel version range. Phase 0 §Operational Delivery names the exact
# pinned matrix as still-outstanding; this lower bound matches the
# mnt_idmap-based VFS API the module compiles against.
BUILD_EXCLUSIVE_KERNEL="^(6\.(1[8-9]|[2-9][0-9])|[7-9]\.).*"
